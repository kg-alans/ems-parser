<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>DTBS Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

    :root {
      --bg: #0b0e14; --border: #232b3e;
      --header-bg: #6b1a2b; --header-rim: #8c2038;
      --accent: #e8a0b0; --text: #dce6f5; --muted: #56647d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { width: 100%; min-height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
    
    .board-header { background: var(--header-bg); border-bottom: 3px solid var(--header-rim); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-left { display: flex; flex-direction: column; gap: 1px; }
    .shop-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; color: #fff; }
    .board-label { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
    .header-right { text-align: right; }
    .clock-time { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: #fff; line-height: 1; }
    .clock-date { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }
    
    .col-header { display: grid; grid-template-columns: 34px 76px 1fr 1fr 70px; gap: 0; padding: 5px 8px; background: var(--bg); position: sticky; top: 63px; z-index: 5; border-bottom: 1px solid var(--border); }
    .col-label { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; text-align: center; }
    .col-label.left { text-align: left; }
    
    .board-body { padding: 0 8px 20px; }
    
    .group { margin-bottom: 8px; }
    .group-header { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 5px 8px; border-radius: 3px 3px 0 0; margin-bottom: 2px; border-left: 3px solid transparent; }
    .group-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .group-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; }
    .group-count { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; }
    .group-divider { height: 1px; margin-bottom: 2px; opacity: 0.3; }
    
    .job-row { display: grid; grid-template-columns: 34px 76px 1fr 1fr 70px; gap: 0; padding: 7px 8px; border-radius: 3px; margin-bottom: 2px; align-items: center; border-left: 4px solid transparent; }
    .cell { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 6px; line-height: 1.2; }
    .cell-center { text-align: center; }
    
    .est-circle { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 900; flex-shrink: 0; }
    
    .cell-ro { font-size: 11px; font-weight: 700; }
    .cell-status { font-size: 10px; font-weight: 600; }
    .cell-promise { font-size: 11px; font-weight: 600; text-align: center; }
    .status-message { text-align: center; padding: 30px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; color: var(--muted); }
  </style>
</head>
<body>
<header class="board-header">
  <div class="header-left">
    <div class="shop-name">KG Body &amp; Glass — DT</div>
    <div class="board-label">3-Day Production Board</div>
  </div>
  <div class="header-right">
    <div class="clock-time" id="clock-time">–:– –</div>
    <div class="clock-date" id="clock-date">–––</div>
  </div>
</header>

<div class="col-header">
  <span class="col-label">Est</span>
  <span class="col-label">RO #</span>
  <span class="col-label left">Customer</span>
  <span class="col-label left">Vehicle</span>
  <span class="col-label">Promise</span>
</div>

<div class="board-body">
  <div id="groups-container"></div>
</div>

<script>

const JSON_URL = 'https://kgdtbs.onrender.com/board-data';
const SYNC_URL = 'https://kgdtbs.onrender.com/last-sync';
const REFRESH_INTERVAL = 5 * 60 * 1000;

const STATUS_RANK = {
  '': 0, 'Prelim': 1, 'Pre-Production': 2, 'Dispatch': 3,
  'Teardown': 4, 'Waiting on Insurance': 5, 'Supp-Estimator': 6,
  'Supp-Insurance': 7, 'Waiting on Parts': 8, 'Need Parts Update': 9,
  'Frame': 10, 'Repair in Process': 11, 'Paint': 12, 'Sublet': 13,
  'Reassembly': 14, 'QC': 15, 'Wash': 16, 'Done': 17,
  'Ready for Delivery': 18, 'Delivered': 19, 'Total Loss': 99
};

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtTime(d) {
  let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  return h + ':' + m + ' ' + ap;
}

function updateClock() {
  const now = new Date();
  if (document.getElementById('clock-time'))
    document.getElementById('clock-time').textContent = fmtTime(now);
  if (document.getElementById('clock-date'))
    document.getElementById('clock-date').textContent = DAYS[now.getDay()] + ' · ' + MONTHS[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

async function fetchLastSync() {
  try {
    const res = await fetch(SYNC_URL + '?_=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    if (data.last_sync) {
      const d = new Date(data.last_sync);
      const now = new Date();
      const sameDay = d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
      const label = sameDay ? fmtTime(d) : MONTHS_SHORT[d.getMonth()]+' '+d.getDate()+' · '+fmtTime(d);
      if (document.getElementById('sync-time')) document.getElementById('sync-time').textContent = label;
    }
  } catch(e) {}
}

function isToday(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr), now = new Date();
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}

function getRowColors(job) {
  const rank = STATUS_RANK[job.repairStatus] !== undefined ? STATUS_RANK[job.repairStatus] : 0;
  if (job.doneToday) return {bg:'#0a2a5c', border:'#55aaff', text:'#c8e0ff'};
  if (job.dtp < 0) return {bg:'#8a0f16', border:'#ff6060', text:'#ffe0e0'};
  if (job.dtp === 0) {
    if (rank <= 11) return {bg:'#8a0f16', border:'#ff6060', text:'#ffe0e0'};
    if (rank <= 13) return {bg:'#5c3a00', border:'#ffaa00', text:'#fff0c0'};
    if (job.targetLate) return {bg:'#8a0f16', border:'#ff6060', text:'#ffe0e0'};
    return {bg:'#0d5229', border:'#55ee88', text:'#d0ffe0'};
  }
  if (job.dtp === 1) {
    if (rank <= 7)  return {bg:'#8a0f16', border:'#ff6060', text:'#ffe0e0'};
    if (rank <= 11) return {bg:'#5c3a00', border:'#ffaa00', text:'#fff0c0'};
    if (job.targetLate) return {bg:'#5c3a00', border:'#ffaa00', text:'#fff0c0'};
    return {bg:'#0d5229', border:'#55ee88', text:'#d0ffe0'};
  }
  if (job.dtp === 2) {
    if (job.targetLate) return {bg:'#5c3a00', border:'#ffaa00', text:'#fff0c0'};
    return {bg:'#0d5229', border:'#55ee88', text:'#d0ffe0'};
  }
  return {bg:'#161c2c', border:'#3a4a6a', text:'#d8e4f8'};
}

function getEstColors(e) {
  e = (e||'').toLowerCase();
  const map = {
    'cordale': {bg:'#0a3d18', text:'#5fffaa', border:'#107c10', glow:'#107c1088'},
    'dana':    {bg:'#3d3200', text:'#ffe066', border:'#d29922', glow:'#d2992288'},
    'logan':   {bg:'#4a0a0a', text:'#ff9999', border:'#c50f1f', glow:'#c50f1f88'},
    'jennie':  {bg:'#2d0a4a', text:'#cc99ff', border:'#8822cc', glow:'#8822cc88'},
    'alan':    {bg:'#0a1a3d', text:'#99c8ff', border:'#1464a5', glow:'#1464a588'},
  };
  return map[e] || {bg:'#1a2030', text:'#8ab0d8', border:'#3a4a6a', glow:'#3a4a6a88'};
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  return MONTHS_SHORT[d.getMonth()] + ' ' + d.getDate();
}

async function fetchBoardData(renderFn) {
  try {
    const res = await fetch(JSON_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    const jobs = raw.map(r => ({
      ro: r.ro||'', customer: r.customer||'', vehicle: r.vehicle||'',
      estimator: r.estimator||'', tech: r.tech||'', painter: r.painter||'',
      repairStatus: r.repairStatus||'', insurance: r.insurance||'', promise: r.promise||'',
      dtp: (r.dtp!==''&&r.dtp!==null&&r.dtp!==undefined) ? parseInt(r.dtp,10) : NaN,
      totalLoss: r.totalLoss==='True'||r.totalLoss===true,
      done: r.done==='True'||r.done===true,
      doneToday: isToday(r.doneTime),
      targetLate: r.target&&r.promise ? new Date(r.target)>new Date(r.promise) : false,
    }));
    const active = jobs.filter(j =>
      !j.doneToday && !j.totalLoss && j.repairStatus &&
      j.repairStatus!=='Ready for Delivery' && j.repairStatus!=='Total Loss' &&
      j.repairStatus!=='Done' && !isNaN(j.dtp) && j.dtp<=2
    );
    renderFn({
      pastdue:  active.filter(j=>j.dtp<0),
      today:    active.filter(j=>j.dtp===0),
      done:     jobs.filter(j=>j.doneToday),
      tomorrow: active.filter(j=>j.dtp===1),
      twodays:  active.filter(j=>j.dtp===2),
    });
  } catch(err) {
    const c = document.getElementById('groups-container');
    if (c) c.innerHTML = '<div class="status-message">⚠ ' + err.message + '</div>';
  }
}

const GROUPS = [
  { label: 'Past Due',      color: '#ff6060', key: 'pastdue' },
  { label: 'Due Today',     color: '#55ee88', key: 'today' },
  { label: 'Done Today',    color: '#55aaff', key: 'done' },
  { label: 'Due Tomorrow',  color: '#ffaa00', key: 'tomorrow' },
  { label: 'Due in 2 Days', color: '#4d8fd4', key: 'twodays' },
];

function renderGroupHeader(group, count) {
  const hdr = document.createElement('div');
  hdr.className = 'group-header';
  hdr.style.background = group.color + '14';
  hdr.style.borderLeftColor = group.color;
  hdr.innerHTML =
    '<div class="group-dot" style="background:'+group.color+';box-shadow:0 0 7px '+group.color+'88"></div>' +
    '<span class="group-label" style="color:'+group.color+'">'+group.label+'</span>' +
    '<div class="group-dot" style="background:'+group.color+';box-shadow:0 0 7px '+group.color+'88"></div>' +
    '<span class="group-count" style="color:'+group.color+'">'+count+' vehicle'+(count!==1?'s':'')+'</span>' +
    '<div class="group-dot" style="background:'+group.color+';box-shadow:0 0 7px '+group.color+'88"></div>';
  return hdr;
}

function getLastName(customer) {
  if (!customer) return '';
  // Handle "Last, First" format
  if (customer.includes(',')) return customer.split(',')[0].trim();
  // Handle "First Last" format
  const parts = customer.trim().split(' ');
  return parts[parts.length - 1];
}

function getInitial(estimator) {
  const e = (estimator||'').toLowerCase();
  const map = {cordale:'C', dana:'D', logan:'L', jennie:'J', alan:'A'};
  return map[e] || estimator.charAt(0).toUpperCase();
}

function renderBoard(grouped) {
  const container = document.getElementById('groups-container');
  container.innerHTML = '';
  GROUPS.forEach(group => {
    const jobs = grouped[group.key]||[];
    if (!jobs.length) return;
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    groupEl.appendChild(renderGroupHeader(group, jobs.length));
    const div = document.createElement('div');
    div.className='group-divider'; div.style.background=group.color;
    groupEl.appendChild(div);
    jobs.forEach(job => {
      const colors = getRowColors(job);
      const ec = getEstColors(job.estimator);
      const row = document.createElement('div');
      row.className='job-row';
      row.style.background=colors.bg;
      row.style.borderLeftColor=ec.border;
      row.style.color=colors.text;
      row.innerHTML=
        '<div class="cell"><div class="est-circle" style="background:'+ec.bg+';color:'+ec.text+';border:1px solid '+ec.border+';box-shadow:0 0 6px '+ec.glow+'">'+getInitial(job.estimator)+'</div></div>'+
        '<div class="cell cell-ro">'+job.ro+'</div>'+
        '<div class="cell">'+getLastName(job.customer)+'</div>'+
        '<div class="cell" style="font-weight:400;opacity:0.9">'+job.vehicle+'</div>'+
        '<div class="cell cell-promise">'+fmtDate(job.promise)+'</div>';
      groupEl.appendChild(row);
    });
    container.appendChild(groupEl);
  });
}

fetchBoardData(renderBoard); fetchLastSync();
setInterval(()=>fetchBoardData(renderBoard), REFRESH_INTERVAL);
setInterval(fetchLastSync, REFRESH_INTERVAL);
setInterval(()=>location.reload(), 30*60*1000);
</script>
</body>
</html>
