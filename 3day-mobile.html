<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <title>DTBS Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Changa+One&family=Saira:wght@400;600;700;800&family=Lexend+Deca:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

    :root { --bg:#0b0e14; --border:#232b3e; --hbg:#6b1a2b; --hrim:#8c2038; --accent:#e8a0b0; --text:#dce6f5; --muted:#56647d; }
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body { width:100%; min-height:100%; background:var(--bg); color:var(--text); font-family:'Lexend Deca',sans-serif; overflow-x:hidden; }
    .board-header { background:var(--hbg); border-bottom:3px solid var(--hrim); padding:10px 12px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .shop-name { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:900; letter-spacing:0.06em; text-transform:uppercase; color:#fff; }
    .board-label { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); }
    .col-header { display:grid; grid-template-columns:36px 78px 1fr 1fr 72px 68px; padding:5px 8px; background:var(--bg); position:sticky; top:63px; z-index:5; border-bottom:1px solid var(--border); }
    .col-label { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; text-align:center; }
    .col-label.left { text-align:left; }
    .board-body { padding:0 8px 72px; }

    .group { margin-bottom:10px; }
    .group-divider { height:1px; margin-bottom:2px; opacity:0.3; }
    .job-row { display:grid; padding:9px 12px 9px 14px; border-radius:3px; margin-bottom:2px; align-items:center; border-left:5px solid transparent; }
    .cell { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:8px; line-height:1; }
    .cell-center { text-align:center; }
    .cell-sm { font-size:11px; opacity:0.85; text-align:center; }
    .repair-status { font-size:12px; font-weight:600; }
    .status-msg { text-align:center; padding:40px; font-family:'Barlow Condensed',sans-serif; font-size:18px; color:var(--muted); }

    .job-row { padding:7px 8px; }
    .board-footer-mobile { position:fixed; bottom:0; left:0; right:0; height:52px; background:#060810; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around; padding:0 16px; z-index:10; }
    .footer-stat-m { display:flex; flex-direction:column; align-items:center; }
    .footer-stat-label-m { font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); }
    .footer-stat-value-m { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800; color:#fff; }
  
    .drawer { overflow:hidden; max-height:0; transition:max-height 0.25s ease; background:#0f131f; border-left:4px solid transparent; border-radius:0 0 4px 4px; margin-bottom:2px; margin-top:-2px; }
    .drawer.open { max-height:200px; }
    .drawer-inner { padding:8px 12px 10px 12px; display:grid; grid-template-columns:1fr 1fr; gap:6px 12px; }
    .drawer-field { display:flex; flex-direction:column; gap:1px; }
    .drawer-label { font-family:'Lexend Deca',sans-serif; font-size:8px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:#56647d; }
    .drawer-value { font-family:'Lexend Deca',sans-serif; font-size:12px; font-weight:500; color:#dce6f5; }
    .drawer-value.full-width { grid-column:1/-1; }

  </style>
</head>
<body>
<header class="board-header">
  <div class="header-left">
    <div style="font-family:'Changa One',sans-serif;font-size:19px;letter-spacing:0.03em;text-transform:uppercase;color:#fff;line-height:1.1">Ken Garff Body &amp; Glass</div>
    <div style="font-family:'Lexend Deca',sans-serif;font-size:8px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:1px">3-Day Production Board</div>
  </div>
  <div class="header-right" style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;">
    <div style="font-family:'Lexend Deca',sans-serif;font-size:8px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.4)">Last Sync</div>
    <div class="clock-time" id="clock-time" style="font-family:'Lexend Deca',sans-serif;font-size:20px;font-weight:600;color:#fff;line-height:1">–:– –</div>
    <div class="clock-date" id="clock-date" style="font-family:'Lexend Deca',sans-serif;font-size:8px;color:#e8a0b0;text-transform:uppercase;letter-spacing:0.1em">–––</div>
  </div>
</header>
<div class="col-header">
  <span class="col-label">Est</span>
  <span class="col-label">RO #</span>
  <span class="col-label left">Customer</span>
  <span class="col-label left">Vehicle</span>
  <span class="col-label">Status</span>
  <span class="col-label">Promise</span>
</div>
<div class="board-body" id="board-body">
  <div id="groups-container"></div>
</div>
<footer class="board-footer-mobile">
  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;width:100%">
    <div style="font-family:'Lexend Deca',sans-serif;font-size:8px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#3a6abf">Completed MTD</div>
    <div style="display:flex;gap:20px;align-items:baseline">
      <span style="font-family:'Lexend Deca',sans-serif;font-size:18px;font-weight:700;color:#fff" id="done-dollars">—</span>
      <span style="font-family:'Lexend Deca',sans-serif;font-size:18px;font-weight:700;color:#fff" id="done-labor">—</span>
    </div>
  </div>
</footer>
<script>

const JSON_URL  = 'https://kgdtbs.onrender.com/board-data';
const SYNC_URL  = 'https://kgdtbs.onrender.com/last-sync';
const MTD_URL   = 'https://kgdtbs.onrender.com/mtd';
const REFRESH   = 5 * 60 * 1000;

const STATUS_RANK = {
  '':0,'Prelim':1,'Pre-Production':2,'Dispatch':3,'Teardown':4,
  'Waiting on Insurance':5,'Supp-Estimator':6,'Supp-Insurance':7,
  'Waiting on Parts':8,'Need Parts Update':9,'Frame':10,
  'Repair in Process':11,'Paint':12,'Sublet':13,'Reassembly':14,
  'QC':15,'Wash':16,'Done':17,'Ready for Delivery':18,
  'Delivered':19,'Total Loss':99
};

const DAYS_L   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_L = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtTimeParts(d) {
  let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const ap = h>=12?'PM':'AM'; h=h%12||12;
  return { time: h+':'+m+' '+ap, date: DAYS_L[d.getDay()]+' · '+MONTHS_L[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear() };
}

function updateClock() {
  const p = fmtTimeParts(new Date());
  const t = document.getElementById('clock-time');
  const d = document.getElementById('clock-date');
  if(t) t.textContent = p.time;
  if(d) d.textContent = p.date;
}
updateClock(); setInterval(updateClock,1000);

async function fetchLastSync() {
  try {
    const res = await fetch(SYNC_URL+'?_='+Date.now());
    if(!res.ok) return;
    const data = await res.json();
    if(data.last_sync) {
      const d = new Date(data.last_sync);
      const now = new Date();
      const sameDay = d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate();
      let h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');
      const ap=h>=12?'PM':'AM'; h=h%12||12;
      const timeStr = h+':'+m+' '+ap;
      const dateStr = sameDay ? DAYS_L[d.getDay()]+' · '+MONTHS_L[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()
                               : MONTHS_S[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
      const st = document.getElementById('sync-time');
      const sd = document.getElementById('sync-date');
      if(st) st.textContent = timeStr;
      if(sd) sd.textContent = dateStr;
    }
  } catch(e){}
}

async function fetchMTD() {
  try {
    const res = await fetch(MTD_URL+'?_='+Date.now());
    if(!res.ok) return;
    const data = await res.json();
    const dEl = document.getElementById('mtd-dollars');
    const lEl = document.getElementById('mtd-labor');
    if(dEl) dEl.textContent = data.dollars != null
      ? '$'+Number(data.dollars).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})
      : '—';
    if(lEl) lEl.textContent = data.labor != null
      ? Number(data.labor).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})+' hrs'
      : '—';
  } catch(e){}
}

function isToday(s) {
  if(!s) return false;
  const d=new Date(s),n=new Date();
  return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();
}

function getRowColors(job) {
  const rank = STATUS_RANK[job.repairStatus]??0;
  if(job.doneToday)           return {bg:'#0b5c73',text:'#ccf0ff'};
  if(job.dtp<0)               return {bg:'#721928',text:'#ffd0d6'};
  if(job.dtp===0){
    if(rank<=11)               return {bg:'#721928',text:'#ffd0d6'};
    if(rank<=13)               return {bg:'#e8b715',text:'#1a1000'};
    if(job.targetLate)         return {bg:'#721928',text:'#ffd0d6'};
    return                           {bg:'#06612c',text:'#ccffde'};
  }
  if(job.dtp===1){
    if(rank<=7)                return {bg:'#721928',text:'#ffd0d6'};
    if(rank<=11)               return {bg:'#e8b715',text:'#1a1000'};
    if(job.targetLate)         return {bg:'#e8b715',text:'#1a1000'};
    return                           {bg:'#06612c',text:'#ccffde'};
  }
  if(job.dtp===2){
    if(job.targetLate)         return {bg:'#e8b715',text:'#1a1000'};
    return                           {bg:'#06612c',text:'#ccffde'};
  }
  return {bg:'#161c2c',text:'#d8e4f8'};
}

function getEst(name) {
  const MAP = {
    'cord':   {bg:'#28de37',dark:'#064014',glow:'#28de37'},
    'cordale':{bg:'#28de37',dark:'#064014',glow:'#28de37'},
    'logan':  {bg:'#fa2d25',dark:'#500606',glow:'#fa2d25'},
    'dana':   {bg:'#faf034',dark:'#5a4400',glow:'#faf034'},
    'jennie': {bg:'#e319b7',dark:'#6a0055',glow:'#e319b7'},
    'alan':   {bg:'#4e82c7',dark:'#0a1830',glow:'#4e82c7'},
    'troy':   {bg:'#4e82c7',dark:'#0a1830',glow:'#4e82c7'},
  };
  return MAP[(name||'').toLowerCase()] || {bg:'#555566',dark:'#1a1a22',glow:'#555566'};
}

function badgeHTML(name, fontSize='14px') {
  const e = getEst(name);
  const display = (name||'').toLowerCase()==='cordale' ? 'CORD' : (name||'').toUpperCase();
  return `<span style="font-family:'Barlow Condensed',sans-serif;font-size:${fontSize};font-weight:900;letter-spacing:0.1em;padding:4px 10px;border-radius:5px;display:inline-block;white-space:nowrap;background:${e.bg};color:${e.dark};border:1px solid ${e.border};box-shadow:0 0 5px ${e.glow},0 0 1px ${e.dark}">${display}</span>`;
}

function fmtDate(iso) {
  if(!iso) return '—';
  const d=new Date(iso+'T12:00:00');
  return MONTHS_S[d.getMonth()]+' '+d.getDate();
}

const GROUPS = [
  {label:'Past Due',     color:'#e3324f',key:'pastdue'},
  {label:'Due Today',    color:'#0cc258',key:'today'},
  {label:'Done Today',   color:'#15b8e6',key:'done'},
  {label:'Due Tomorrow', color:'#e8b715',key:'tomorrow'},
  {label:'Due in 2 Days',color:'#4e82c7',key:'twodays'},
];

function groupHeader(group, count) {
  const g = document.createElement('div');
  g.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:7px;padding:5px 8px;border-radius:3px 3px 0 0;margin-bottom:2px;border-left:3px solid #3a4255;background:#1a1e2a';
  g.innerHTML =
    `<div style="width:6px;height:6px;border-radius:50%;background:#8a95a8;box-shadow:0 0 5px #8a95a8cc;flex-shrink:0"></div>` +
    `<span style="font-family:'Saira',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:#c5cfd8;text-shadow:0 0 6px #c5cfd888">${group.label}</span>` +
    `<div style="width:6px;height:6px;border-radius:50%;background:#8a95a8;box-shadow:0 0 5px #8a95a8cc;flex-shrink:0"></div>`;
  return g;
}

async function loadBoardData(renderFn) {
  try {
    const res = await fetch(JSON_URL+'?_='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const raw = await res.json();
    const jobs = raw.map(r=>({
      ro:r.ro||'', customer:r.customer||'', vehicle:r.vehicle||'',
      estimator:r.estimator||'', tech:r.tech||'', painter:r.painter||'',
      repairStatus:r.repairStatus||'', insurance:r.insurance||'',
      promise:r.promise||'', target:r.target||'',
      dtp:(r.dtp!==''&&r.dtp!=null)?parseInt(r.dtp,10):NaN,
      totalLoss:r.totalLoss==='True'||r.totalLoss===true,
      doneToday:isToday(r.doneTime),
      targetLate:r.target&&r.promise?new Date(r.target)>new Date(r.promise):false,
    }));
    const active = jobs.filter(j=>
      !j.doneToday&&!j.totalLoss&&j.repairStatus&&
      j.repairStatus!=='Ready for Delivery'&&j.repairStatus!=='Total Loss'&&
      j.repairStatus!=='Done'&&!isNaN(j.dtp)&&j.dtp<=2
    );
    renderFn({
      pastdue:  active.filter(j=>j.dtp<0),
      today:    active.filter(j=>j.dtp===0),
      done:     jobs.filter(j=>j.doneToday),
      tomorrow: active.filter(j=>j.dtp===1),
      twodays:  active.filter(j=>j.dtp===2),
    });
  } catch(err){
    const c=document.getElementById('groups-container');
    if(c) c.innerHTML='<div style="text-align:center;padding:40px;font-family:Barlow Condensed,sans-serif;font-size:18px;color:#56647d">⚠ '+err.message+'</div>';
  }
}

function startRefresh(renderFn) {
  loadBoardData(renderFn); fetchLastSync(); fetchMTD();
  setInterval(()=>loadBoardData(renderFn), REFRESH);
  setInterval(fetchLastSync, REFRESH);
  setInterval(fetchMTD, REFRESH);
  setInterval(()=>location.reload(), 30*60*1000);
}


function getInitials(name) {
  const MAP = {cord:'CB',cordale:'CB',logan:'LL',dana:'DH',jennie:'JN',alan:'MGMT',troy:'MGMT'};
  return MAP[(name||'').toLowerCase()] || (name||'?').charAt(0).toUpperCase();
}
function getLastName(customer) {
  if(!customer) return '';
  if(customer.includes(',')) return customer.split(',')[0].trim();
  const parts = customer.trim().split(' ');
  return parts[parts.length-1];
}
function truncVehicle(v) {
  if(!v) return '';
  const parts = v.trim().split(' ');
  return parts.slice(0,2).join(' ');
}
function mBadge(name) {
  const e = getEst(name);
  const initials = getInitials(name);
  return `<div style="width:30px;height:30px;border-radius:50%;background:${e.bg};color:${e.dark};border:1px solid ${e.border};box-shadow:0 0 4px ${e.glow};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:900;letter-spacing:0.05em;flex-shrink:0">${initials}</div>`;
}
function renderBoard(grouped) {
  const container = document.getElementById('groups-container');
  container.innerHTML = '';
  GROUPS.forEach(group => {
    const jobs = grouped[group.key]||[];
    if(!jobs.length) return;
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    groupEl.appendChild(groupHeader(group, jobs.length));
    const div = document.createElement('div');
    div.className='group-divider'; div.style.background='#3a4255';
    groupEl.appendChild(div);
    jobs.forEach(job => {
      const colors = getRowColors(job);
      const e = getEst(job.estimator);
      const row = document.createElement('div');
      row.className = 'job-row';
      row.style.cssText = `grid-template-columns:36px 78px 1fr 1fr 72px 68px;background:${colors.bg};border-left-color:${e.bg};color:${colors.text}`;
      row.innerHTML =
        `<div class="cell" style="display:flex;align-items:center">${mBadge(job.estimator)}</div>`+
        `<div class="cell" style="font-size:11px;font-weight:700">${job.ro}</div>`+
        `<div class="cell" style="font-size:11px">${getLastName(job.customer)}</div>`+
        `<div class="cell" style="font-size:11px;opacity:0.9">${truncVehicle(job.vehicle)}</div>`+
        `<div class="cell cell-center" style="font-size:10px;font-weight:600">${job.repairStatus}</div>`+
        `<div style="font-size:11px;font-weight:600;opacity:0.9;text-align:right">${fmtDate(job.promise)}</div>`;
      const drawerEl = document.createElement('div');
      drawerEl.className = 'drawer';
      drawerEl.style.borderLeftColor = row.style.borderLeftColor;
      drawerEl.innerHTML = `<div class="drawer-inner">
        <div class="drawer-field"><span class="drawer-label">Status</span><span class="drawer-value">${job.repairStatus||'—'}</span></div>
        <div class="drawer-field"><span class="drawer-label">Insurance</span><span class="drawer-value">${job.insurance||'—'}</span></div>
        <div class="drawer-field"><span class="drawer-label">Tech</span><span class="drawer-value">${job.tech||'—'}</span></div>
        <div class="drawer-field"><span class="drawer-label">Painter</span><span class="drawer-value">${job.painter||'—'}</span></div>
        <div class="drawer-field"><span class="drawer-label">Drop Date</span><span class="drawer-value">${fmtDate(job.dropDate)||'—'}</span></div>
        <div class="drawer-field"><span class="drawer-label">Promise Date</span><span class="drawer-value">${fmtDate(job.promise)||'—'}</span></div>
      </div>`;
      row.addEventListener('click', () => {
        const isOpen = drawerEl.classList.contains('open');
        document.querySelectorAll('.drawer.open').forEach(d => d.classList.remove('open'));
        if(!isOpen) drawerEl.classList.add('open');
      });
      groupEl.appendChild(row);
      groupEl.appendChild(drawerEl);
    });
    container.appendChild(groupEl);
  });
}
startRefresh(renderBoard);

</script>
</body>
</html
function yearMake(vehicle) {
  if (!vehicle) return '';
  const parts = vehicle.trim().split(' ');
  return parts.slice(0, 2).join(' ');
}
