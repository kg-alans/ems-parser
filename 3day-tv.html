<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>DTBS Production Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0e14; --border: #232b3e;
      --header-bg: #6b1a2b; --header-rim: #8c2038;
      --accent: #e8a0b0; --text: #dce6f5; --muted: #56647d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1280px; height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; overflow: hidden; }

    /* ── HEADER ── */
    .board-header {
      height: 76px; background: var(--header-bg); border-bottom: 3px solid var(--header-rim);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: relative; z-index: 10;
    }
    .header-left { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
    .shop-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; white-space: nowrap; }
    .board-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); }
    .header-center { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; padding: 0 16px; }
    .legend { display: flex; gap: 14px; flex-wrap: nowrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: rgba(255,255,255,0.55); text-transform: uppercase; white-space: nowrap; }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .last-sync { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); text-transform: uppercase; }
    .header-right { text-align: right; flex-shrink: 0; }
    .clock-time { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: 0.06em; color: #fff; line-height: 1; white-space: nowrap; }
    .clock-date { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; white-space: nowrap; }

    /* ── BOARD BODY ── */
    .board-body { height: calc(100vh - 76px); overflow-y: scroll; padding: 0 14px 20px; scrollbar-width: none; }
    .board-body::-webkit-scrollbar { display: none; }

    /* ── COL HEADERS sticky — 9 cols, no target ── */
    .col-header {
      display: grid;
      grid-template-columns: 96px 90px 150px 1.4fr 120px 82px 82px 1fr 88px;
      gap: 0; padding: 6px 10px 6px 16px;
      background: var(--bg); position: sticky; top: 0; z-index: 5;
      border-bottom: 1px solid var(--border); margin-bottom: 5px;
    }
    .col-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; text-align: center; }
    .col-label.left { text-align: left; }

    /* ── GROUP ── */
    .group { margin-bottom: 10px; }
    .group-header {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      padding: 6px 10px; border-radius: 4px 4px 0 0; margin-bottom: 2px; border-left: 4px solid transparent;
    }
    .group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .group-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; }
    .group-count { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
    .group-divider { height: 1px; margin-bottom: 2px; opacity: 0.3; }

    /* ── JOB ROW — 9 cols, no target ── */
    .job-row {
      display: grid;
      grid-template-columns: 96px 90px 150px 1.4fr 120px 82px 82px 1fr 88px;
      gap: 0; padding: 8px 10px 8px 12px; border-radius: 3px; margin-bottom: 2px;
      align-items: center; border-left: 5px solid transparent;
    }
    .cell { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; line-height: 1; }
    .cell-ro { font-size: 13px; font-weight: 700; }
    .cell-vehicle { font-weight: 400; opacity: 0.9; }
    .cell-center { text-align: center; }
    .cell-est { display: flex; align-items: center; }
    .badge { font-size: 12px; font-weight: 700; letter-spacing: 0.03em; padding: 4px 8px; border-radius: 4px; display: inline-block; white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
    .est-cordale { background: #0a3d18; color: #5fffaa; border: 1px solid #107c1066; }
    .est-dana    { background: #3d3200; color: #ffe066; border: 1px solid #d2992266; }
    .est-logan   { background: #4a0a0a; color: #ff9999; border: 1px solid #c50f1f66; }
    .est-jennie  { background: #0a1a3d; color: #99c8ff; border: 1px solid #1464a566; }
    .est-other   { background: #1a2030; color: #8ab0d8; border: 1px solid #3a4a6a44; }
    .cell-tech   { font-size: 11px; opacity: 0.85; text-align: center; }
    .cell-painter { font-size: 11px; opacity: 0.8; text-align: center; }
    .cell-insurance { font-size: 11px; opacity: 0.85; text-align: center; }
    .repair-status { font-size: 12px; font-weight: 600; }
    .cell-promise { font-size: 13px; font-weight: 600; opacity: 0.9; text-align: center; }
    .status-message { text-align: center; padding: 40px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; color: var(--muted); }
  </style>
</head>
<body>
<header class="board-header">
  <div class="header-left">
    <div class="shop-name">Ken Garff Body &amp; Glass — Downtown</div>
    <div class="board-label">3-Day Production Board</div>
  </div>
  <div class="header-center">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ff6060"></div>Past Due / Won't Make It</div>
      <div class="legend-item"><div class="legend-dot" style="background:#55ee88"></div>On Track</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffdd22"></div>Might Not Make It</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6699ff"></div>Done Today</div>
    </div>
    <div class="last-sync" id="last-sync-label">Last sync: —</div>
  </div>
  <div class="header-right">
    <div class="clock-time" id="clock-time">–:– –</div>
    <div class="clock-date" id="clock-date">–––</div>
  </div>
</header>

<div class="board-body" id="board-body">
  <div class="col-header">
    <span class="col-label left">Estimator</span>
    <span class="col-label">RO #</span>
    <span class="col-label">Customer</span>
    <span class="col-label">Vehicle</span>
    <span class="col-label">Insurance</span>
    <span class="col-label">Tech</span>
    <span class="col-label">Painter</span>
    <span class="col-label">Repair Status</span>
    <span class="col-label">Promise</span>
  </div>
  <div id="groups-container"></div>
</div>

<script>
const JSON_URL = 'https://kgdtbs.onrender.com/board-data';
const SYNC_URL = 'https://kgdtbs.onrender.com/last-sync';
const REFRESH_INTERVAL = 5 * 60 * 1000;

const STATUS_RANK = {
  '': 0, 'Prelim': 1, 'Pre-Production': 2, 'Dispatch': 3,
  'Teardown': 4, 'Waiting on Insurance': 5, 'Supp-Estimator': 6,
  'Supp-Insurance': 7, 'Waiting on Parts': 8, 'Need Parts Update': 9,
  'Frame': 10, 'Repair in Process': 11, 'Paint': 12, 'Sublet': 13,
  'Reassembly': 14, 'QC': 15, 'Wash': 16, 'Done': 17,
  'Ready for Delivery': 18, 'Delivered': 19, 'Total Loss': 99
};

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock-time').textContent = h + ':' + m + ' ' + ampm;
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clock-date').textContent = DAYS[now.getDay()] + ' · ' + MONTHS[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
}
updateClock();
setInterval(updateClock, 1000);

async function fetchLastSync() {
  try {
    const res = await fetch(SYNC_URL + '?_=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    if (data.last_sync) {
      const d = new Date(data.last_sync);
      let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('last-sync-label').textContent = 'Last sync: ' + h + ':' + m + ' ' + ampm;
    }
  } catch(e) {}
}

function isToday(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

function getRowColors(job) {
  const { dtp, targetLate, repairStatus, done } = job;
  const rank = STATUS_RANK[repairStatus] !== undefined ? STATUS_RANK[repairStatus] : 0;
  if (done) return { bg: '#0d2d6e', text: '#c0d8ff' };
  if (dtp < 0) return { bg: '#8a0f16', text: '#ffe0e0' };
  if (dtp === 0) {
    if (rank <= 11) return { bg: '#8a0f16', text: '#ffe0e0' };
    if (rank <= 13) return { bg: '#5c4600', text: '#fff8c0' };
    if (targetLate) return { bg: '#8a0f16', text: '#ffe0e0' };
    return { bg: '#0d5229', text: '#d0ffe0' };
  }
  if (dtp === 1) {
    if (rank <= 7)  return { bg: '#8a0f16', text: '#ffe0e0' };
    if (rank <= 11) return { bg: '#5c4600', text: '#fff8c0' };
    if (targetLate) return { bg: '#5c4600', text: '#fff8c0' };
    return { bg: '#0d5229', text: '#d0ffe0' };
  }
  if (dtp === 2) {
    if (targetLate) return { bg: '#5c4600', text: '#fff8c0' };
    return { bg: '#0d5229', text: '#d0ffe0' };
  }
  return { bg: '#161c2c', text: '#d8e4f8' };
}

function getEstimatorStripe(e) {
  e = (e || '').toLowerCase();
  if (e === 'cordale') return '#107c10';
  if (e === 'logan')   return '#c50f1f';
  if (e === 'dana')    return '#d29922';
  if (e === 'jennie')  return '#1464a5';
  return '#3a4a6a';
}

function getEstClass(e) {
  e = (e || '').toLowerCase();
  if (e === 'cordale') return 'est-cordale';
  if (e === 'dana')    return 'est-dana';
  if (e === 'logan')   return 'est-logan';
  if (e === 'jennie')  return 'est-jennie';
  return 'est-other';
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return M[d.getMonth()] + ' ' + d.getDate();
}

const groups = [
  { label: 'Past Due',      color: '#ff6060', key: 'pastdue' },
  { label: 'Due Today',     color: '#55ee88', key: 'today' },
  { label: 'Done Today',    color: '#6699ff', key: 'done' },
  { label: 'Due Tomorrow',  color: '#ffdd22', key: 'tomorrow' },
  { label: 'Due in 2 Days', color: '#4d8fd4', key: 'twodays' },
];

async function fetchBoardData() {
  try {
    const res = await fetch(JSON_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    const jobs = raw.map(r => ({
      ro:           r.ro || '',
      customer:     r.customer || '',
      vehicle:      r.vehicle || '',
      estimator:    r.estimator || '',
      tech:         r.tech || '',
      painter:      r.painter || '',
      repairStatus: r.repairStatus || '',
      insurance:    r.insurance || '',
      promise:      r.promise || '',
      dtp:          r.dtp !== '' && r.dtp !== null ? parseInt(r.dtp, 10) : NaN,
      totalLoss:    r.totalLoss === 'True' || r.totalLoss === true,
      done:         r.done === 'True' || r.done === true,
      doneToday:    isToday(r.doneTime),
      targetLate:   r.target && r.promise ? new Date(r.target) > new Date(r.promise) : false,
    }));

    const active = jobs.filter(j =>
      !j.done && !j.totalLoss &&
      j.repairStatus !== '' &&
      j.repairStatus !== 'Ready for Delivery' &&
      j.repairStatus !== 'Total Loss' &&
      j.repairStatus !== 'Done' &&
      !isNaN(j.dtp) && j.dtp <= 2
    );

    renderBoard({
      pastdue:  active.filter(j => j.dtp < 0),
      today:    active.filter(j => j.dtp === 0),
      done:     jobs.filter(j => j.done && j.doneToday),
      tomorrow: active.filter(j => j.dtp === 1),
      twodays:  active.filter(j => j.dtp === 2),
    });
  } catch(err) {
    document.getElementById('groups-container').innerHTML =
      '<div class="status-message">⚠ ' + err.message + '</div>';
  }
}

function renderBoard(grouped) {
  const container = document.getElementById('groups-container');
  container.innerHTML = '';
  groups.forEach(group => {
    const jobs = grouped[group.key] || [];
    if (!jobs.length) return;
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.style.background = group.color + '14';
    hdr.style.borderLeftColor = group.color;
    hdr.innerHTML =
      '<div class="group-dot" style="background:' + group.color + ';box-shadow:0 0 6px ' + group.color + '88"></div>' +
      '<span class="group-label" style="color:' + group.color + '">' + group.label + '</span>' +
      '<div class="group-dot" style="background:' + group.color + ';box-shadow:0 0 6px ' + group.color + '88"></div>' +
      '<span class="group-count" style="color:' + group.color + '">' + jobs.length + ' vehicle' + (jobs.length !== 1 ? 's' : '') + '</span>' +
      '<div class="group-dot" style="background:' + group.color + ';box-shadow:0 0 6px ' + group.color + '88"></div>';
    groupEl.appendChild(hdr);
    const div = document.createElement('div');
    div.className = 'group-divider';
    div.style.background = group.color;
    groupEl.appendChild(div);
    jobs.forEach(job => {
      const colors = getRowColors(job);
      const row = document.createElement('div');
      row.className = 'job-row';
      row.style.background = colors.bg;
      row.style.borderLeftColor = getEstimatorStripe(job.estimator);
      row.style.color = colors.text;
      row.innerHTML =
        '<div class="cell cell-est"><span class="badge ' + getEstClass(job.estimator) + '">' + job.estimator + '</span></div>' +
        '<div class="cell cell-ro">' + job.ro + '</div>' +
        '<div class="cell">' + job.customer + '</div>' +
        '<div class="cell cell-vehicle">' + job.vehicle + '</div>' +
        '<div class="cell cell-insurance">' + job.insurance + '</div>' +
        '<div class="cell cell-tech">' + job.tech + '</div>' +
        '<div class="cell cell-painter">' + job.painter + '</div>' +
        '<div class="cell cell-center"><span class="repair-status">' + job.repairStatus + '</span></div>' +
        '<div class="cell cell-promise">' + fmtDate(job.promise) + '</div>';
      groupEl.appendChild(row);
    });
    container.appendChild(groupEl);
  });
}

fetchBoardData();
fetchLastSync();
setInterval(fetchBoardData, REFRESH_INTERVAL);
setInterval(fetchLastSync, REFRESH_INTERVAL);
setInterval(() => location.reload(), 30 * 60 * 1000);

// ── AUTO-SCROLL ───────────────────────────────────────────────────
const boardBody = document.getElementById('board-body');
let scrollPos = 0;
let direction = 1;
let pauseTicks = 0;
const SPEED = 0.7;
const PAUSE_TOP    = 10000 / 30;  // 10 seconds at top
const PAUSE_BOTTOM = 5000 / 30;   // 5 seconds at bottom
const TICK = 30;

setInterval(() => {
  const maxScroll = boardBody.scrollHeight - boardBody.clientHeight;
  if (maxScroll <= 0) return;
  if (pauseTicks > 0) { pauseTicks--; return; }
  scrollPos += SPEED * direction;
  if (scrollPos >= maxScroll) {
    scrollPos = maxScroll;
    direction = -1;
    pauseTicks = PAUSE_BOTTOM;
  } else if (scrollPos <= 0) {
    scrollPos = 0;
    direction = 1;
    pauseTicks = PAUSE_TOP;
  }
  boardBody.scrollTop = scrollPos;
}, TICK);
</script>
</body>
</html>
